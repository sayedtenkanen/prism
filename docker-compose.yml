version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prism-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism_secret}
      POSTGRES_DB: ${POSTGRES_DB:-prism}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism} -d ${POSTGRES_DB:-prism}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prism-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prism:
    build: .
    container_name: prism-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism_secret}@postgres:5432/${POSTGRES_DB:-prism}
      REDIS_URL: redis://redis:6379/0
      SCM_GITHUB_TOKEN: ${SCM_GITHUB_TOKEN}
      LLM_API_KEY: ${LLM_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
